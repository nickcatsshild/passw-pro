services:
  passw-pro:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Database backends to enable: sqlite, mysql, postgresql
        DB: sqlite,mysql,postgresql
        # Build profile: release, dev
        CARGO_PROFILE: release
    image: passw-pro/server:latest
    container_name: passw-pro
    restart: unless-stopped
    ports:
      - "80:80"
      # Descomente para usar HTTPS diretamente (requer certificados)
      # - "443:443"
    volumes:
      # Persistência dos dados (banco SQLite, anexos, sends, etc.)
      - ./passw-data/:/data/
      # Descomente para carregar arquivo .env customizado
      # - ./.env:/.env:ro
    environment:
      # Domínio público do servidor (OBRIGATÓRIO para U2F/WebAuthn, links de email)
      DOMAIN: "https://example.com"
      # Permitir registro de novos usuários
      SIGNUPS_ALLOWED: "true"
      # Habilitar WebSocket para sincronização em tempo real
      # WEBSOCKET_ENABLED: "true"
      # Token para acesso ao painel admin
      # ADMIN_TOKEN: "seu-token-aqui"
    cap_drop:
      - ALL
    cap_add:
      - CAP_NET_BIND_SERVICE
      - CAP_CHOWN
      - CAP_SETUID
      - CAP_SETGID
    security_opt:
      - no-new-privileges:yes
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - passw-pro-network

  # Descomente para usar MySQL/MariaDB
  # mysql:
  #   image: docker.io/library/mariadb:11
  #   container_name: passw-pro-db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: "root_password"
  #     MYSQL_DATABASE: "passw-pro"
  #     MYSQL_USER: "passw-pro"
  #     MYSQL_PASSWORD: "db_password"
  #   volumes:
  #     - ./passw-db/:/var/lib/mysql/
  #   networks:
  #     - passw-pro-network

  # Descomente para usar PostgreSQL
  # postgresql:
  #   image: docker.io/library/postgres:17
  #   container_name: passw-pro-pg
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: "passw-pro"
  #     POSTGRES_USER: "passw-pro"
  #     POSTGRES_PASSWORD: "db_password"
  #   volumes:
  #     - ./passw-pgdata/:/var/lib/postgresql/data/
  #   networks:
  #     - passw-pro-network

networks:
  passw-pro-network:
    driver: bridge
